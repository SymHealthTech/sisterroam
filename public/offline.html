<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline – SisterRoam</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: #111827;
    }
    .logo {
      width: 56px;
      height: 56px;
      background: #5D1A8B;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .logo svg { width: 30px; height: 30px; fill: white; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #6B7280; line-height: 1.6; max-width: 280px; margin: 0 auto 28px; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    button {
      background: #5D1A8B;
      color: white;
      border: none;
      border-radius: 16px;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4a1570; }
    .footer { margin-top: 40px; font-size: 12px; color: #9CA3AF; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <div class="logo">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="10" r="5" />
      <path d="M8 24c0-4.4 3.6-8 8-8s8 3.6 8 8" />
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>
    SisterRoam needs an internet connection to connect you with sisters around the world.
    Check your connection and try again.
  </p>
  <button onclick="window.location.reload()">Retry connection</button>
  <p class="footer">SisterRoam – Safe travel for women</p>
</body>
</html>
